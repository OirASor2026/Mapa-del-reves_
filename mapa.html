<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>oir a sor — mapa</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
font-family: 'Bahnschrift', 'Arial Narrow', Arial, sans-serif;
background: #0a1628;
color: #fff;
overflow-x: hidden;
}
.map-wrap {
position: relative;
width: 100%;
max-width: 100vw;
}
.map-img {
width: 100%;
display: block;
}
/* ===== Hotspots con imagen propia ===== */
.hotspot {
position: absolute;
display: block;
overflow: visible; /* para que el "acercamiento" no se recorte */
background: transparent;
border: none;
padding: 0;
}
.hotspot.is-link {
cursor: pointer;
}
.hotspot.is-static {
cursor: default;
}
.hotspot-img {
width: 100%;
height: 100%;
display: block;
object-fit: contain;
transform-origin: center center;
transition: transform 0.2s ease;
pointer-events: none; /* el click lo maneja el contenedor .hotspot */
}
/* Efecto LATIDO / ACERCAMIENTO (reemplaza al glow anterior) */
.hotspot:hover .hotspot-img,
.hotspot:focus-visible .hotspot-img {
animation: latido 0.9s ease-in-out infinite;
}
@keyframes latido {
0%, 100% { transform: scale(1); }
50% { transform: scale(1.07); }
}
@media (prefers-reduced-motion: reduce) {
.hotspot:hover .hotspot-img,
.hotspot:focus-visible .hotspot-img {
animation: none;
transform: scale(1.04);
}
}
/* ===== Posiciones exactas (en % sobre la imagen base) ===== */
/* 1. Logo — Volver al inicio */
.hs-logo {
left: 3.4%;
top: 3.96%;
width: 7.67%;
height: 4.91%;
}
/* 2. Zonas descubiertas — sin funcionalidad */
.hs-descubiertas {
left: 75.50%;
top: 10.65%;
width: 23.68%;
height: 11.2%;
}
/* 3. Confidencial — Discord */
.hs-confidencial {
left: 3.4%;
top: 80.15%;
width: 10.32%;
height: 15.49%;
}
/* 4. Ver evidencias — abre panel de fotos */
.hs-ver-evidencias {
left: 74.0%;
top: 27.76%;
width: 24%;
height: 30%;
}
/* 5. Aportar — formulario para enviar evidencia */
.hs-aportar {
left: 77.92%;
top: 79.04%;
width: 16.64%;
height: 12.22%;
}
/* 6. Estado de zonas — sin funcionalidad */
.hs-estado {
left: 81.09%;
top: 60.3%;
width: 12.57%;
height: 12.25%;
}
.evidencias-panel {
max-width: 100%;
max-height: 0;
overflow: hidden;
background: #060d18;
border-top: 2px solid #FF0000;
transition: max-height 0.5s ease;
}
.evidencias-panel.open {
max-height: 2400px;
}
.evidencias-inner {
padding: 48px 60px;
}
.evidencias-header {
display: flex;
justify-content: space-between;
align-items: baseline;
margin-bottom: 32px;
flex-wrap: wrap;
gap: 16px;
}
.evidencias-title {
font-size: 28px;
letter-spacing: 0.1em;
text-transform: uppercase;
color: #fff;
font-weight: 700;
}
.evidencias-title span {
color: #FF0000;
}
.evidencias-close {
background: none;
border: 1px solid rgba(255,255,255,0.3);
color: #fff;
font-family: inherit;
font-size: 11px;
letter-spacing: 0.15em;
text-transform: uppercase;
padding: 10px 24px;
cursor: pointer;
transition: border-color 0.2s, color 0.2s;
}
.evidencias-close:hover {
border-color: #FF0000;
color: #FF0000;
}
.evidencias-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
gap: 28px;
}
.evidencia-card {
border: 1px solid rgba(255,255,255,0.1);
background: rgba(255,255,255,0.02);
}
.evidencia-card img {
width: 100%;
display: block;
}
.evidencia-caption {
padding: 14px 18px;
font-size: 11px;
letter-spacing: 0.1em;
color: rgba(255,255,255,0.4);
text-transform: uppercase;
display: flex;
justify-content: space-between;
}
.evidencia-caption .tag {
color: #FF0000;
}
</style>
</head>
<body>
<div class="map-wrap">
<img class="map-img" src="mapa-bg.png" alt="Mapa de túneles — oir a sor" />

<!-- 1. Logo — Volver al inicio -->
<a class="hotspot is-link hs-logo" href="index.html" title="Volver al inicio">
<img class="hotspot-img" src="btn-logo.png" alt="oir a sor" />
</a>

<!-- 2. Zonas descubiertas — sin funcionalidad -->
<div class="hotspot is-static hs-descubiertas" title="Zonas descubiertas">
<img class="hotspot-img" src="btn-descubiertas.png" alt="Zonas descubiertas" />
</div>

<!-- 3. Confidencial — Discord -->
<a class="hotspot is-link hs-confidencial" href="https://discord.gg/EN6EG39uqk" target="_blank" title="Confidencial — unirse al Discord">
<img class="hotspot-img" src="btn-confidencial.png" alt="Confidencial" />
</a>

<!-- 4. Ver evidencias — abre panel de fotos -->
<button class="hotspot is-link hs-ver-evidencias" onclick="toggleEvidencias()" title="Ver evidencias">
<img class="hotspot-img" src="btn-ver-evidencias.png" alt="Ver evidencias" />
</button>

<!-- 5. Aportar — formulario para enviar evidencia -->
<a class="hotspot is-link hs-aportar" href="aportar.html" title="Aportar evidencia">
<img class="hotspot-img" src="btn-aportar.png" alt="Aportar" />
</a>

<!-- 6. Estado de zonas — sin funcionalidad -->
<div class="hotspot is-static hs-estado" title="Estado de zonas">
<img class="hotspot-img" src="btn-estado-zonas.png" alt="Estado de zonas" />
</div>
</div>

<div class="evidencias-panel" id="evidenciasPanel">
<div class="evidencias-inner">
<div class="evidencias-header">
<div class="evidencias-title">Evidencias — <span>Túnel 04</span></div>
<button class="evidencias-close" onclick="toggleEvidencias()">Cerrar ✕</button>
</div>
<div class="evidencias-grid">
<div class="evidencia-card">
<img src="evidencia1.jpg" alt="Evidencia 1 — Túnel 04" />
<div class="evidencia-caption">
<span>Registro fotográfico</span>
<span class="tag">#04-A</span>
</div>
</div>
<div class="evidencia-card">
<img src="evidencia2.jpg" alt="Evidencia 2 — Túnel 04" />
<div class="evidencia-caption">
<span>Registro fotográfico</span>
<span class="tag">#04-B</span>
</div>
</div>
</div>
</div>
</div>

<script>
function toggleEvidencias() {
const panel = document.getElementById('evidenciasPanel');
panel.classList.toggle('open');
if (panel.classList.contains('open')) {
setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
}
}
</script>
</body>
</html>
